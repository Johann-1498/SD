version: "3"

services:
  ####################### Client Definition #######################
  client:
    restart: always
    container_name: client
    build:
      context: client
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      VITE_API_BASE_URL: https://api.unsa.rvaldiviase.me
    volumes:
      - ./client/src/:/opt/client/src/
      - "/app/node_modules"
    ports:
      - 3000:3000
    depends_on:
      - server
    networks:
      - default
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.react-frontend.rule=Host(`unsa.rvaldiviase.me`)"
      - "traefik.http.routers.react-frontend.entrypoints=websecure"
      - "traefik.http.routers.react-frontend.tls=true"
      - "traefik.http.routers.react-frontend.tls.certresolver=cloudflare"
      - "traefik.http.services.react-frontend.loadbalancer.server.port=3000"

  ####################### Database Definition #######################
  database:
    container_name: database
    build:
      context: database
    ports:
      - 5435:5432
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=sample_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - default

  ####################### Server Definition #######################
  server:
    container_name: server
    build:
      context: server
    volumes:
      - "./server:/opt/server/"
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - APP_SETTINGS=app.config.DevelopmentConfig
      - DATABASE_URL=postgresql://admin:password@database:5432/sample_db
      - DATABASE_TEST_URL=postgresql://admin:password@database:5432/sample_db_test
    depends_on:
      - server-migrate
    networks:
      - default
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flask-backend.rule=Host(`api.unsa.rvaldiviase.me`)"
      - "traefik.http.routers.flask-backend.entrypoints=websecure"
      - "traefik.http.routers.flask-backend.tls=true"
      - "traefik.http.routers.flask-backend.tls.certresolver=cloudflare"
      - "traefik.http.services.flask-backend.loadbalancer.server.port=5000"

  ####### Server Database Migration Definition ###########

  server-migrate:
    restart: on-failure
    container_name: server-migrate
    build:
      context: server
    command: python manage.py create-db
    volumes:
      - "./server:/opt/server/"
    environment:
      - FLASK_ENV=development
      - APP_SETTINGS=app.config.Config
      - DATABASE_URL=postgresql://admin:password@database:5432/sample_db
      - DATABASE_TEST_URL=postgresql://admin:password@database:5432/sample_db_test
    depends_on:
      - database
    networks:
      - default

####################### Networks Definition #######################
networks:
  default:
    driver: bridge
  traefik_proxy:
    external: true

####################### Volumes Definition #######################
volumes:
  postgres-data:
